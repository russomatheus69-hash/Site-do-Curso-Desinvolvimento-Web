<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meu Site</title>

<style>

body{
  margin: 0;
  font-family: Arial, sans-serif;

  background-image: url('fundo-index.jpg');
  background-size: cover;
  background-position: center;
  height: 100vh;
overflow-y: scroll;

  padding-top: 70px;
}

/* MENU SUPERIOR */
.topbar{
  position: fixed;
  top: 0;
  left: 0;

  width: 100%;
  height: 70px;

  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);

  display: flex;
  align-items: center;
  justify-content: center;

  z-index: 999;
}

.topbar a{
  color: white;
  text-decoration: none;

  margin: 0 25px;
  font-size: 18px;
  font-weight: bold;

  transition: 0.3s;
}

.topbar a:hover{
  color: #81CF65;
}

/* LOGIN E CADASTRO */
.auth-buttons{
  position: fixed;
  top: 15px;
  right: 80px;

  z-index: 1001;
}

.auth-buttons button{
  background: #81CF65;
  color: white;
  border: none;

  padding: 10px 15px;
  margin-left: 5px;

  border-radius: 8px;
  cursor: pointer;
}

.formulario{
  display: none;

  position: fixed;
  top: 80px;
  right: 20px;

  width: 300px;

  background: white;
  padding: 20px;
  border-radius: 10px;

  box-shadow: 0 0 15px rgba(0,0,0,0.3);

  z-index: 1002;
}

.formulario h3{
  margin-top: 0;
}

.formulario input{
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  box-sizing: border-box;
}

.formulario button{
  width: 100%;
  padding: 10px;

  background: #81CF65;
  color: white;
  border: none;

  border-radius: 5px;
}

/* TEXTO CENTRAL */
.conteudo{
  position: absolute;
  top: 210px;

  width: 100%;
  text-align: center;

  color: white;

  text-shadow: 2px 2px 6px rgba(0,0,0,0.8);
}

.conteudo h1{
  font-size: 42px;
  margin-bottom: 10px;
}

.conteudo p{
  font-size: 18px;
  max-width: 600px;
  margin: 0 auto;
}

/* PRIMEIRO CARROSSEL */
.carousel{
  position: absolute;
  bottom: 40px;

  width: 100%;
  overflow: hidden;
}

.carousel-track{
  display: flex;
  width: max-content;

  animation: slide 20s linear infinite;
}

.carousel img{
  width: 300px;
  height: 180px;

  object-fit: cover;

  margin-right: 20px;
  border-radius: 15px;

  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}

/* SEGUNDO CARROSSEL */
.carousel2{
  position: absolute;
  bottom: 260px;

  width: 100%;
  overflow: hidden;
}

.carousel-track2{
  display: flex;
  width: max-content;

  animation: slide2 15s linear infinite;
}

.carousel2 img{
  width: 300px;
  height: 180px;

  object-fit: cover;

  margin-right: 20px;
  border-radius: 15px;

  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}

/* ANIMAÇÕES */
@keyframes slide{
  from{
    transform: translateX(0);
  }

  to{
    transform: translateX(-50%);
  }
}

@keyframes slide2{
  from{
    transform: translateX(-50%);
  }

  to{
    transform: translateX(0);
  }
}

</style>
</head>

<body>

<!-- MENU SUPERIOR -->

<script>

function mostrarFormulario(tipo){

  const formulario = document.getElementById(tipo);

  // Se já estiver aberto, fecha
  if(formulario.style.display === "block"){
    formulario.style.display = "none";
    return;
  }

  // Fecha os dois
  document.getElementById("login").style.display = "none";
  document.getElementById("cadastro").style.display = "none";

  // Abre o selecionado
  formulario.style.display = "block";
}

</script>
